<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0,
    maximum-scale=1.0,
    user-scalable=no
  "
/>

<title>Playtime Insights Banner</title>

<style>
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000000; /* Exact match */
  color: white;
  font-family: Arial, sans-serif; /* Exact match */
}

/* PAGE WRAPPER */
.page {
  padding: 0;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  height: 100%;
}

/* SYSTEM NOTIFICATION BANNER */
.insightBanner {
  background: #111; /* Exact match */
  border: 1px solid #222; /* Exact match */
  border-radius: 6px;
  padding: 4px 10px;
  display: flex;
  align-items: center;
  transition: all 0.3s ease;
  animation: slideIn 0.4s ease-out;
  
  /* Exact requested dimensions */
  width: 398px;
  height: 41px;
  box-sizing: border-box;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Banner States matching reference file precisely */
.insightBanner.warning {
  border-color: #000000; /* Exact match */
  background: rgba(245, 158, 11, 0.05); /* Exact match */
}

.insightBanner.hype {
  border-color: #000000; /* Exact match */
  background: rgba(139, 92, 246, 0.05); /* Exact match */
}

.insightContent {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px; /* Force text horizontal scale */
  overflow: hidden;
  white-space: nowrap;
}

.insightTitle {
  font-size: 11.5px;
  font-weight: bold;
  flex-shrink: 0;
}

.insightBanner.warning .insightTitle { color: #f59e0b; } /* Exact match */
.insightBanner.hype .insightTitle { color: #a78bfa; } /* Exact match */

.insightDesc {
  font-size: 11px;
  color: #ccc; /* Exact match */
  overflow: hidden;
  text-overflow: ellipsis; 
}

/* Keep strong targets white for visibility against black backdrop */
.insightDesc strong {
  color: #ffffff;
}
</style>
</head>

<body>

<div class="page">

  <div class="insightBanner" id="insightBanner" style="display: none;">
    <div class="insightContent">
      <div class="insightTitle" id="insightTitle"></div>
      <div class="insightDesc" id="insightDesc"></div>
    </div>
  </div>

</div>

<script>
// Live network configurations safely embedded
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRqMqbCRZdfrIDgdkarWSH7iy3qhwhSCsfjAOcKVYO60m3smkMLMIT8hQWBdmrboORQJGsC3FwmVRq/pub?output=csv";
const gameApi = "https://script.google.com/macros/s/AKfycbzcX9WsRdeEdz1ziWq4CbuUwa_WwxxUGPI1YtMTvYIHZGZ4cBus_p7qXdIIiFW_0hu_/exec";

let csvRows = [];
let gameData = [];

// Load instantly from local storage cache if it exists
const cachedCsv = localStorage.getItem("roblox_csv_cache");
const cachedGames = localStorage.getItem("roblox_games_cache");

if (cachedCsv && cachedGames) {
  try {
    csvRows = JSON.parse(cachedCsv);
    gameData = JSON.parse(cachedGames);
    processInsights();
  } catch(e) {}
}

async function loadAllData() {
  try {
    const [csvRes, apiRes] = await Promise.all([
      fetch(csvUrl).then(res => res.text()),
      fetch(gameApi).then(res => res.json())
    ]);

    csvRows = csvRes.trim().split("\n").slice(1).map(row => row.split(","));
    gameData = apiRes;
    
    // Update cache with fresh data
    localStorage.setItem("roblox_csv_cache", JSON.stringify(csvRows));
    localStorage.setItem("roblox_games_cache", JSON.stringify(gameData));
    
    processInsights();
  } catch (err) {
    console.error("Failed to fetch fresh live data:", err);
  }
}

function toLocalISO(dateObj) {
  const offset = dateObj.getTimezoneOffset();
  const localDate = new Date(dateObj.getTime() - (offset * 60 * 1000));
  return localDate.toISOString().split('T')[0];
}

/* 🔥 LOCAL TIME-ZONE CORRECTED STREAK ENGINE */
function calculateStreaks() {
  const streaks = {};
  const todayStr = toLocalISO(new Date());
  
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = toLocalISO(yesterday);

  const gameDates = {};
  gameData.forEach(g => {
    if (!g.date) return;
    const dateStr = toLocalISO(new Date(g.date));
    if (!gameDates[g.id]) {
      gameDates[g.id] = new Set();
    }
    gameDates[g.id].add(dateStr);
  });

  Object.keys(gameDates).forEach(id => {
    let currentStreak = 0;
    let checkDate = new Date();

    if (!gameDates[id].has(todayStr)) {
      if (gameDates[id].has(yesterdayStr)) {
        checkDate = new Date(yesterday.getTime());
      } else {
        streaks[id] = 0;
        return;
      }
    }

    while (true) {
      const checkStr = toLocalISO(checkDate);
      if (gameDates[id].has(checkStr)) {
        currentStreak++;
        checkDate.setDate(checkDate.getDate() - 1);
      } else {
        break;
      }
    }
    streaks[id] = currentStreak;
  });

  return streaks;
}

/* 🧠 WEEK/DAY ANALYSIS BANNER LOGIC */
function processInsights() {
  const banner = document.getElementById("insightBanner");
  const bTitle = document.getElementById("insightTitle");
  const bDesc = document.getElementById("insightDesc");

  if (!gameData || gameData.length === 0) {
    banner.style.display = "none";
    return;
  }

  const todayStr = toLocalISO(new Date());
  const streaks = calculateStreaks();

  // 1. Gather sessions primarily focused on today and this week
  const todaySessions = gameData.filter(g => g.date && toLocalISO(new Date(g.date)) === todayStr && g.minutes > 0);
  const weekSessions = gameData.filter(g => {
    if (!g.date || g.minutes <= 0) return false;
    const diff = (new Date() - new Date(g.date)) / (1000 * 60 * 60 * 24);
    return diff <= 7.0; 
  });

  // Check 1: Game Hopping (ADHD Warning) - Tracked by the DAY
  if (todaySessions.length >= 3) {
    const sortedToday = [...todaySessions].sort((a, b) => new Date(a.date) - new Date(b.date));
    const bounceCounter = {};
    let lastGameId = null;

    sortedToday.forEach(entry => {
      if (!bounceCounter[entry.id]) {
        bounceCounter[entry.id] = { count: 0, totalMinutes: 0 };
      }
      
      if (lastGameId && lastGameId !== entry.id) {
        bounceCounter[entry.id].count += 1;
      } else if (!lastGameId) {
        bounceCounter[entry.id].count = 1;
      }
      
      bounceCounter[entry.id].totalMinutes += entry.minutes;
      lastGameId = entry.id;
    });

    for (const id in bounceCounter) {
      const stats = bounceCounter[id];
      const match = gameData.find(g => g.id === id);
      if (stats.count >= 2 && (stats.totalMinutes / stats.count) <= 20 && match) {
        banner.className = "insightBanner warning";
        bTitle.innerText = "Getting bored";
        bDesc.innerHTML = `in <strong>${match.name}</strong>. Take a quick break!`;
        banner.style.display = "flex";
        return; 
      }
    }
  }

  // Check 2: Hyperfocus Phase - Tracked by the WEEK
  const weeklyAggregated = {};
  weekSessions.forEach(g => {
    if (!weeklyAggregated[g.id]) {
      weeklyAggregated[g.id] = 0;
    }
    weeklyAggregated[g.id] += g.minutes;
  });

  for (const id in weeklyAggregated) {
    const totalMins = weeklyAggregated[id];
    const streak = streaks[id] || 0;
    const match = gameData.find(g => g.id === id);

    if ((streak >= 3 || totalMins >= 480) && match) {
      banner.className = "insightBanner hype";
      bTitle.innerText = "In a phase";
      bDesc.innerHTML = `on <strong>${match.name}</strong> with ${Math.floor(totalMins / 60)}h played with a <strong>${streak} day</strong> streak!`;
      banner.style.display = "flex";
      return;
    }
  }

  banner.style.display = "none";
}

loadAllData();
setInterval(loadAllData, 60000);
</script>

</body>
</html>
